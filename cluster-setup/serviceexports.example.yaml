# Reference manifest of the Services each region needs to export for the
# other region to reach, over whatever cross-cluster connectivity solution
# is in place (this suite was built using Submariner - see CLUSTER_SETUP.md
# section 1). A ServiceExport carries no configuration beyond its name and
# namespace; applying it is what makes that Service resolvable from the
# other cluster.
#
# Apply this same list in BOTH regions' namespaces (the Services themselves
# are created by the Camunda Helm install and the MinIO deployment - this
# just makes them reachable cross-cluster):
#
#   oc --context <context> -n <namespace> apply -f cluster-setup/serviceexports.example.yaml
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: camunda-zeebe
  namespace: <namespace>
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: camunda-zeebe-gateway
  namespace: <namespace>
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: camunda-elasticsearch
  namespace: <namespace>
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: camunda-elasticsearch-master-hl
  namespace: <namespace>
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: camunda-connectors
  namespace: <namespace>
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: camunda-connectors-headless
  namespace: <namespace>
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: minio
  namespace: <namespace>
