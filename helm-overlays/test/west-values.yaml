# Main values file for west. See the header comment in
# test/east-values.yaml for the full rationale (Operate/Tasklist
# permanently on in both regions, never part of the active/passive toggle -
# Zeebe is never restarted by a promotion/demotion).
connectors:
  enabled: true
elasticsearch:
  enabled: true
  extraEnvVarsSecret: elasticsearch-env-secret
  initScripts:
    init-keystore.sh: |
      #!/bin/bash
      set -e

      echo "Adding S3 access keys to Elasticsearch keystore..."

      # Add S3 client camunda keys to the keystore
      echo "$S3_SECRET_KEY" | elasticsearch-keystore add -x s3.client.camunda.secret_key
      echo "$S3_ACCESS_KEY" | elasticsearch-keystore add -x s3.client.camunda.access_key
  master:
    persistence:
      size: 30Gi
    replicaCount: 3
    resources:
      limits:
        cpu: 1
        memory: 2Gi
      requests:
        cpu: 0.1
        memory: 512M
global:
  secrets:
    autoGenerated: false
    name: camunda-credentials
  compatibility:
    openshift:
      adaptSecurityContext: force
  identity:
    auth:
      enabled: false
      publicIssuerUrl: "http://camunda-keycloak/auth/realms/camunda-platform"
      issuerBackendUrl: "http://camunda-keycloak/auth/realms/camunda-platform"
  multiregion:
    regionId: 1
    regions: 2
identity:
  # Active-active in both regions, permanently - see the comment in
  # test/east-values.yaml.
  enabled: true
  fullURL: "http://localhost:18281"
  env:
    - name: KEYCLOAK_URL
      value: "http://camunda-keycloak/auth"
    - name: KEYCLOAK_SETUP_USER
      value: "admin"
    - name: KEYCLOAK_SETUP_REALM
      value: "master"
    - name: KEYCLOAK_SETUP_CLIENT_ID
      value: "admin-cli"
    - name: KEYCLOAK_SETUP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: camunda-credentials
          key: identity-keycloak-admin-password
identityKeycloak:
  enabled: true
  auth:
    existingSecret: camunda-credentials
    passwordSecretKey: identity-keycloak-admin-password
  # Same standalone, always-on Keycloak Postgres as the shared east-values.yaml -
  # one instance, living permanently in east, never touched by promote/demote/
  # reset, reached via Submariner's cross-cluster clusterset.local DNS.
  postgresql:
    enabled: false
  externalDatabase:
    host: keycloak-postgres.camunda-yahia-dr-559de-1.svc.clusterset.local
    port: 5432
    user: bn_keycloak
    database: bitnami_keycloak
    existingSecret: camunda-credentials
    existingSecretPasswordKey: identity-keycloak-postgresql-user-password
optimize:
  # Active-active, same rationale as identity/identityKeycloak above.
  enabled: true
orchestration:
  clusterSize: "8"
  # Permanently on in both regions - see the comment in
  # test/east-values.yaml.
  profiles:
    operate: true
    tasklist: true
  env:
  - name: CAMUNDA_DATA_BACKUP_REPOSITORYNAME
    value: camunda_backup
  - name: CAMUNDA_PERSISTENT_SESSIONS_ENABLED
    value: "true"
  - name: ZEEBE_BROKER_CLUSTER_INITIALCONTACTPOINTS
    value: camunda-zeebe-0.local-cluster.camunda-zeebe.camunda-yahia-dr-559de-1.svc.clusterset.local.:26502,camunda-zeebe-0.yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local.:26502,camunda-zeebe-1.local-cluster.camunda-zeebe.camunda-yahia-dr-559de-1.svc.clusterset.local.:26502,camunda-zeebe-1.yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local.:26502,camunda-zeebe-2.local-cluster.camunda-zeebe.camunda-yahia-dr-559de-1.svc.clusterset.local.:26502,camunda-zeebe-2.yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local.:26502,camunda-zeebe-3.local-cluster.camunda-zeebe.camunda-yahia-dr-559de-1.svc.clusterset.local.:26502,camunda-zeebe-3.yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local.:26502
  - name: ZEEBE_BROKER_EXPORTERS_CAMUNDAREGION0_CLASSNAME
    value: io.camunda.exporter.CamundaExporter
  - name: ZEEBE_BROKER_EXPORTERS_CAMUNDAREGION0_ARGS_CONNECT_URL
    value: http://local-cluster.camunda-elasticsearch-master-hl.camunda-yahia-dr-559de-1.svc.clusterset.local:9200
  - name: ZEEBE_BROKER_EXPORTERS_CAMUNDAREGION1_CLASSNAME
    value: io.camunda.exporter.CamundaExporter
  - name: ZEEBE_BROKER_EXPORTERS_CAMUNDAREGION1_ARGS_CONNECT_URL
    value: http://yahia-dr-559de-2.camunda-elasticsearch-master-hl.camunda-yahia-dr-559de-2.svc.clusterset.local:9200
  - name: CAMUNDA_DATA_SNAPSHOTPERIOD
    value: 5m
  - name: ZEEBE_BROKER_CLUSTER_MEMBERSHIP_PROBETIMEOUT
    value: 1000ms
  - name: ZEEBE_BROKER_CLUSTER_MEMBERSHIP_PROBEINTERVAL
    value: 2s
  - name: ZEEBE_BROKER_CLUSTER_MEMBERSHIP_FAILURETIMEOUT
    value: 10000ms
  - name: ZEEBE_BROKER_EXPERIMENTAL_RAFT_SNAPSHOTREQUESTTIMEOUT
    value: 10s
  - name: ZEEBE_BROKER_CLUSTER_MESSAGECOMPRESSION
    value: GZIP
  - name: ZEEBE_BROKER_BACKPRESSURE_AIMD_REQUESTTIMEOUT
    value: 1s
  - name: ZEEBE_BROKER_NETWORK_ADVERTISEDHOST
    value: $(K8S_NAME).yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local
  - name: ZEEBE_BROKER_GATEWAY_CLUSTER_MESSAGECOMPRESSION
    value: GZIP
  - name: ZEEBE_BROKER_GATEWAY_CLUSTER_MEMBERSHIP_PROBETIMEOUT
    value: 1000ms
  - name: ZEEBE_BROKER_GATEWAY_CLUSTER_MEMBERSHIP_PROBEINTERVAL
    value: 2s
  - name: ZEEBE_BROKER_GATEWAY_CLUSTER_MEMBERSHIP_FAILURETIMEOUT
    value: 10000ms
  exporters:
    camunda:
      enabled: false
    zeebe:
      enabled: false
  initContainers:
  - command:
    - /bin/sh
    - -c
    - |
      set -eu
      command -v getent >/dev/null 2>&1 || { echo "getent unavailable; skipping cross-region DNS gate."; exit 0; }
      deadline=$(( $(date +%s) + ${CLUSTERSET_DNS_TIMEOUT_SECONDS:-720} ))
      echo "Waiting for cross-region clusterset DNS to resolve all Zeebe contact points..."
      for ep in $(echo "camunda-zeebe-0.local-cluster.camunda-zeebe.camunda-yahia-dr-559de-1.svc.clusterset.local.:26502,camunda-zeebe-0.yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local.:26502,camunda-zeebe-1.local-cluster.camunda-zeebe.camunda-yahia-dr-559de-1.svc.clusterset.local.:26502,camunda-zeebe-1.yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local.:26502,camunda-zeebe-2.local-cluster.camunda-zeebe.camunda-yahia-dr-559de-1.svc.clusterset.local.:26502,camunda-zeebe-2.yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local.:26502,camunda-zeebe-3.local-cluster.camunda-zeebe.camunda-yahia-dr-559de-1.svc.clusterset.local.:26502,camunda-zeebe-3.yahia-dr-559de-2.camunda-zeebe.camunda-yahia-dr-559de-2.svc.clusterset.local.:26502" | tr ',' ' '); do
        host=$(echo "$ep" | cut -d: -f1)
        until getent hosts "$host" >/dev/null 2>&1; do
          if [ "$(date +%s)" -ge "$deadline" ]; then
            echo "  giving up on $host (global ~12 min DNS budget exhausted); starting broker anyway (fail-open)."
            break
          fi
          echo "  waiting for $host ..."
          sleep 5
        done
      done
      echo "Cross-region DNS gate complete; starting broker."
    env:
    - name: CLUSTERSET_DNS_TIMEOUT_SECONDS
      value: "5"
    image: camunda/camunda:8.8.28
    name: wait-clusterset-dns
  logLevel: ERROR
  partitionCount: "8"
  pvcSize: 32Gi
  replicationFactor: "4"
  resources:
    limits:
      cpu: 1512m
      memory: 5Gi
    requests:
      cpu: 200m
      memory: 2Gi
  security:
    initialization:
      defaultRoles:
        admin:
          users:
          - venom
        connectors:
          clients:
          - connectors
          users:
          - connectors
      # users[].password comes from the shared helm-overlays/orchestration-users.yaml.
